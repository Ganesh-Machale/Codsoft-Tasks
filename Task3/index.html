<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="Stylesheet" href="index.css">
</head>
<body>
<p class="page-title">// Calculator</p>
<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="btn-grid">
                                           <!-- Row 1 -->
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="util"  onclick="toggleSign()">+/−</button>
    <button class="util"  onclick="percent()">%</button>
    <button class="op"    onclick="inputOp('÷')">÷</button>
                                             <!-- Row 2 -->
    <button class="num" onclick="inputNum('7')">7</button>
    <button class="num" onclick="inputNum('8')">8</button>
    <button class="num" onclick="inputNum('9')">9</button>
    <button class="op"  onclick="inputOp('×')">×</button>
                                           <!-- Row 3 -->
    <button class="num" onclick="inputNum('4')">4</button>
    <button class="num" onclick="inputNum('5')">5</button>
    <button class="num" onclick="inputNum('6')">6</button>
    <button class="op"  onclick="inputOp('−')">−</button>
                                             <!-- Row 4 -->
    <button class="num" onclick="inputNum('1')">1</button>
    <button class="num" onclick="inputNum('2')">2</button>
    <button class="num" onclick="inputNum('3')">3</button>
    <button class="op"  onclick="inputOp('+')">+</button>
                                              <!-- Row 5 -->
    <button class="num zero" onclick="inputNum('0')">0</button>
    <button class="num" onclick="inputDecimal()">.</button>
    <button class="eq"  onclick="calculate()">=</button>
  </div>

  <div class="history">
    <span id="history-label"></span>
    <span id="history-val"></span>
  </div>
</div>

<p class="keyboard-hint">Supports keyboard input</p>

<script src="index.js"></script>

</body>
</html>
